name: mykirana
description: "MyKirana — digital udhari and ordering for village kirana shops."
publish_to: 'none'
version: 1.0.0+18

environment:
  sdk: '^3.12.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  uuid: ^4.5.1
  shimmer: ^3.0.0

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage / offline-first
  sqflite: ^2.4.1
  path: ^1.9.0

  # Localization
  intl: ^0.20.2

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  firebase_storage: ^12.3.7
  firebase_messaging: ^15.1.6

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Media
  image_picker: ^1.1.2

  # Networking
  http: ^1.2.2

  # Connectivity (for sync manager)
  connectivity_plus: ^6.1.0

  # Local persistence (locale, role, linked-shop memory)
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - lib/localization/en.json
    - lib/localization/hi.json
    - lib/localization/mr.json

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icons/my kirana.png"
  min_sdk_android: 23 # Matches our build.gradle configuration
  adaptive_icon_background: "#1B6B4A" # Assuming standard primary color for background
  adaptive_icon_foreground: "assets/icons/my kirana.png"
